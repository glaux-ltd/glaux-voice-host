<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Glaux Voice Host</title>
<style>
  :root { color-scheme: light; }
  body { font-family: -apple-system, "PingFang SC", sans-serif; margin: 0; padding: 24px 18px;
         background: #2B3A67; color: #fff; line-height: 1.6; text-align: center; }
  .logo { font-size: 22px; font-weight: 700; letter-spacing: 1px; margin-top: 12vh; }
  .status { font-size: 17px; margin-top: 18px; opacity: .92; }
  .sub { font-size: 13px; opacity: .6; margin-top: 8px; word-break: break-all; }
  .dot { display:inline-block; width:10px; height:10px; border-radius:50%; background:#F0B429; margin-right:6px; vertical-align:middle; }
  .dot.in { background:#27AE60; } .dot.err { background:#E74C3C; } .dot.end { background:#7A7F8E; }
</style>
</head>
<body>
  <div class="logo">Glaux</div>
  <div class="status"><span class="dot" id="dot"></span><span id="s">初始化…</span></div>
  <div class="sub" id="sub"></div>

<script type="module">
/*
 * Glaux WebView 语音通话承载壳(零密钥)。
 * @vapi-ai/web 经 CDN 载入;public key + assistant_id + session_id 由 App 经 WebView
 * 消息桥运行时注入(window.__glauxStart),仓库内不含任何密钥。
 * 后续优化(暂不做):生产把 SDK 自托管进本仓,去掉 CDN 外部依赖。
 */
import Vapi from 'https://esm.sh/@vapi-ai/web@2';

var vapi = null;
function post(msg) {
  if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(JSON.stringify(msg));
}
function setStatus(text, cls) {
  document.getElementById('s').textContent = text;
  var dot = document.getElementById('dot');
  dot.className = 'dot' + (cls ? ' ' + cls : '');
}

// App → 页面:开始通话(注入凭据 + 绑定 session)
window.__glauxStart = function (cfg) {
  try {
    if (vapi) return;
    if (!cfg || !cfg.public_key || !cfg.assistant_id) {
      setStatus('配置缺失', 'err'); post({ type: 'status', value: 'error', error: 'missing config' }); return;
    }
    setStatus('接通中…', null); post({ type: 'status', value: 'connecting' });
    vapi = new Vapi(cfg.public_key);
    vapi.on('call-start', function () { setStatus('通话中', 'in'); post({ type: 'status', value: 'in-call' }); });
    vapi.on('call-end', function () { setStatus('已结束', 'end'); post({ type: 'status', value: 'ended' }); });
    vapi.on('error', function (e) {
      var m = (e && (e.message || e.error || e.errorMsg)) ? (e.message || e.error || e.errorMsg) : 'unknown';
      setStatus('出错', 'err'); document.getElementById('sub').textContent = String(m);
      post({ type: 'status', value: 'error', error: String(m) });
    });
    // 仅用于调试可见,不回传(避免噪音);如需可放开 message 转发
    vapi.on('speech-start', function () { post({ type: 'event', value: 'speech-start' }); });
    vapi.on('speech-end', function () { post({ type: 'event', value: 'speech-end' }); });
    // session 绑定:metadata.session_id → custom-llm 经 body.(call.)metadata.session_id 取
    vapi.start(cfg.assistant_id, { metadata: { session_id: cfg.session_id } });
  } catch (e) {
    setStatus('启动失败', 'err'); document.getElementById('sub').textContent = String(e);
    post({ type: 'status', value: 'error', error: String(e) });
  }
};

// App → 页面:挂断
window.__glauxHangup = function () {
  try { if (vapi) vapi.stop(); } catch (e) {}
};

// 页面就绪 → 通知 App 注入配置(握手,避免 race)
setStatus('就绪,等待接入…', null);
post({ type: 'ready' });
</script>
</body>
</html>
